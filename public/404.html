<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TUKI Learning Tower</title>
  <script>
    // Single Page Apps for GitHub Pages - Project Site version
    // For: https://stevenjobins.github.io/tuki-app/
    var segmentCount = 1; // /tuki-app/ = 1 segment
    var l = window.location;
    var origin = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '');
    var pathname = l.pathname;
    
    // Extract path after /tuki-app/
    var pathAfterBase = pathname.replace(/^\/tuki-app\//, '');
    if (pathAfterBase && pathAfterBase !== '/') {
      var redirectUrl = origin + '/tuki-app/?/' + pathAfterBase + l.search + l.hash;
      window.location.replace(redirectUrl);
    } else {
      // Fallback - go to root
      window.location.replace(origin + '/tuki-app/');
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
